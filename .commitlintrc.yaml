rules:
  type-enum:
    - 2
    - always
    - [feat, fix, docs, refactor, test, chore, ci]
  type-case:
    - 2
    - always
    - lower-case
  subject-empty:
    - 2
    - never
  subject-max-length:
    - 2
    - always
    - 72
  scope-case:
    - 2
    - always
    - lower-case
